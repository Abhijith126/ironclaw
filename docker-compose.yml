version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: workout-mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ~/docker/ironclaw/data:/data/db
    networks:
      - workout-app-network

  server:
    build: ./server
    container_name: workout-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/workout-tracker
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - workout-app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: workout-client
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - server
    networks:
      - workout-app-network

networks:
  workout-app-network:
    driver: bridge
